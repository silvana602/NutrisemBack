version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrisem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nutrisem}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nutrisem}
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrisem-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - '4000:4000'
    command: sh -c "npm run migration:run && npm run start:prod"

volumes:
  postgres_data:
